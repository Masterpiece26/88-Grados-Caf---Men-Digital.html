<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>88° Grados Café - Menú Digital</title>
<meta name="description" content="Menú digital de 88° Grados Café. Precios sincronizados automáticamente con Loyverse.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #241c14; font-family: Inter, sans-serif; color: #F4ECE1; }
  ::-webkit-scrollbar { display: none; }
  a { color: #F2C14E; }
  a:hover { color: #E85D04; }
  button { font-family: inherit; }
  @keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .placeholder-img {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #3a2e1e, #2f2519);
    display: flex; align-items: center; justify-content: center;
    font-family: Poppins, sans-serif; font-weight: 700; font-size: 13px;
    color: #6b5c47; text-align: center; padding: 8px; line-height: 1.3;
  }
  .placeholder-img img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<div id="app" style="min-height: 100vh; background: linear-gradient(180deg, #241c14 0%, #241c14 100%); padding-bottom: 60px;">

  <div style="position: sticky; top: 0; z-index: 30; background: #241c14ee; backdrop-filter: blur(10px); border-bottom: 1px solid #ffffff14;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 18px 20px 14px;">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px;">
        <div>
          <div style="font-family: Poppins, sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.02em; color: #F2C14E; line-height: 1.1;">88° Grados Café</div>
          <div style="font-size: 13px; color: #C9B9A4; margin-top: 2px;">Menú digital · toca cualquier producto para ver detalles</div>
          <div id="table-badge" style="display:none; margin-top: 6px; align-items: center; gap: 5px; background: #E85D0426; border: 1px solid #E85D0460; color: #F2C14E; font-family: Inter, sans-serif; font-weight: 700; font-size: 12.5px; padding: 3px 10px; border-radius: 999px; width: fit-content;"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
          <button id="cart-btn" style="position: relative; width: 44px; height: 44px; border-radius: 50%; background: #ffffff0d; border: 1px solid #ffffff20; display: flex; align-items: center; justify-content: center; font-size: 19px; cursor: pointer; color: #F4ECE1;">
            🛒
            <span id="cart-count-badge" style="display:none; position: absolute; top: -4px; right: -4px; background: #E85D04; color: #fff; font-size: 10.5px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; align-items: center; justify-content: center; padding: 0 4px; font-family: Inter, sans-serif;"></span>
          </button>
          <div style="width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, #E85D04, #F2C14E); display: flex; align-items: center; justify-content: center; font-family: Poppins, sans-serif; font-weight: 800; color: #241c14; font-size: 15px; flex-shrink: 0;">88°</div>
        </div>
      </div>

      <div style="margin-top: 14px; position: relative;">
        <input id="search-input" type="text" placeholder="Buscar en el menú…" style="width: 100%; padding: 12px 16px 12px 40px; border-radius: 12px; border: 1px solid #ffffff20; background: #ffffff0d; color: #F4ECE1; font-size: 15px; font-family: Inter, sans-serif; outline: none;">
        <span style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #C9B9A4; font-size: 15px;">🔍</span>
      </div>

      <div id="category-tabs" style="display: flex; gap: 8px; overflow-x: auto; margin-top: 14px; padding-bottom: 2px;"></div>
    </div>
  </div>

  <div style="max-width: 1100px; margin: 0 auto; padding: 22px 20px 0;">
    <div id="section-title" style="font-family: Poppins, sans-serif; font-weight: 700; font-size: 20px; color: #F4ECE1; margin-bottom: 14px;"></div>
    <div id="item-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px;"></div>
    <div id="no-results" style="display:none; text-align: center; padding: 60px 20px; color: #C9B9A4;">
      <div style="font-size: 32px; margin-bottom: 8px;">🔎</div>
      <div style="font-family: Poppins, sans-serif; font-weight: 600; font-size: 16px; color: #F4ECE1;">Sin resultados</div>
      <div style="font-size: 14px; margin-top: 4px;">Prueba con otra palabra o revisa otra categoría.</div>
    </div>
    <div id="loading-state" style="text-align: center; padding: 60px 20px; color: #C9B9A4;">Cargando menú…</div>
  </div>

  <div id="item-modal-overlay" style="display:none; position: fixed; inset: 0; background: #140f09cc; z-index: 100; align-items: flex-end; justify-content: center;">
    <div id="item-modal" style="animation: modalIn 0.22s ease-out; background: #2f2519; width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; overflow: hidden; max-height: 88vh; overflow-y: auto; border: 1px solid #ffffff1a; border-bottom: none;"></div>
  </div>

  <div id="cart-overlay" style="display:none; position: fixed; inset: 0; background: #140f09cc; z-index: 110; align-items: flex-end; justify-content: center;">
    <div id="cart-panel" style="animation: modalIn 0.22s ease-out; background: #2f2519; width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; max-height: 88vh; display: flex; flex-direction: column; border: 1px solid #ffffff1a; border-bottom: none;"></div>
  </div>

</div>

<script>
const WHATSAPP_NUMBER = '582123340106';
const DATA_URL = './data/menu-data.json';

function getTableNumberFromURL() {
  const params = new URLSearchParams(window.location.search);
  const mesa = params.get('mesa');
  return mesa && mesa.trim() ? mesa.trim() : null;
}

const state = {
  catalog: null,
  activeCategory: '',
  search: '',
  activeItemId: null,
  selectedSizeIndex: 0,
  qty: 1,
  cart: [],
  cartOpen: false,
  modSelections: {},
  customerFirstName: '',
  customerLastName: '',
  customerFormError: false,
  tableNumber: getTableNumberFromURL(),
};

function fmt(n) {
  return 'Bs. ' + Number(n).toLocaleString('es-VE');
}

function priceLabelFor(item) {
  if (item.price != null) return fmt(item.price);
  if (item.sizes && item.sizes.length) {
    const min = Math.min(...item.sizes.map(s => s.price));
    return 'Desde ' + fmt(min);
  }
  return '';
}

function cartKey(id, sizeLabel) {
  return id + '::' + (sizeLabel || '');
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function placeholderImg(name) {
  return `<div class="placeholder-img">${escapeHtml(name)}</div>`;
}

function computeModifiers(item, modSelections) {
  let modDelta = 0;
  let modOverridePrice = null;
  const modSummaryParts = [];
  if (item && item.mods) {
    for (const gid of item.mods) {
      const group = state.catalog.MODIFIER_GROUPS[gid];
      const sel = modSelections[gid];
      if (group.type === 'single') {
        const idx = sel != null ? sel : 0;
        const opt = group.options[idx];
        if (opt) {
          if (opt.override) modOverridePrice = opt.price;
          else modDelta += opt.price;
          modSummaryParts.push(opt.label);
        }
      } else {
        const idxs = sel || [];
        idxs.forEach(i => {
          const opt = group.options[i];
          if (opt) { modDelta += opt.price; modSummaryParts.push(opt.label); }
        });
      }
    }
  }
  return { modDelta, modOverridePrice, modSummaryParts };
}

function render() {
  renderCategoryTabs();
  renderItemGrid();
  renderModal();
  renderCart();
}

function renderCategoryTabs() {
  const el = document.getElementById('category-tabs');
  if (!state.catalog) { el.innerHTML = ''; return; }
  el.innerHTML = state.catalog.CATEGORIES.map(c => {
    const active = c.id === state.activeCategory;
    const bg = active ? '#E85D04' : '#ffffff0d';
    const color = active ? '#241c14' : '#F4ECE1';
    const border = active ? '#E85D04' : '#ffffff20';
    return `<button data-cat="${escapeHtml(c.id)}" style="flex-shrink: 0; padding: 9px 16px; border-radius: 999px; border: 1px solid ${border}; background: ${bg}; color: ${color}; font-family: Inter, sans-serif; font-weight: 600; font-size: 13.5px; cursor: pointer; white-space: nowrap;">${escapeHtml(c.name)}</button>`;
  }).join('');
  el.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeCategory = btn.dataset.cat;
      state.search = '';
      document.getElementById('search-input').value = '';
      render();
    });
  });
}

function renderItemGrid() {
  const grid = document.getElementById('item-grid');
  const noResults = document.getElementById('no-results');
  const sectionTitleEl = document.getElementById('section-title');
  const loadingEl = document.getElementById('loading-state');

  if (!state.catalog) {
    grid.innerHTML = '';
    noResults.style.display = 'none';
    sectionTitleEl.textContent = '';
    loadingEl.style.display = 'block';
    return;
  }
  loadingEl.style.display = 'none';

  const { CATEGORIES, ITEMS } = state.catalog;
  const q = state.search.trim().toLowerCase();
  let baseItems, sectionTitle;
  if (q) {
    baseItems = ITEMS.filter(it => it.name.toLowerCase().includes(q));
    sectionTitle = `Resultados para "${state.search.trim()}"`;
  } else {
    baseItems = ITEMS.filter(it => it.cat === state.activeCategory);
    const cat = CATEGORIES.find(c => c.id === state.activeCategory);
    sectionTitle = cat ? cat.name : '';
  }
  sectionTitleEl.textContent = sectionTitle;

  if (baseItems.length === 0) {
    grid.innerHTML = '';
    grid.style.display = 'none';
    noResults.style.display = 'block';
    return;
  }
  grid.style.display = 'grid';
  noResults.style.display = 'none';

  grid.innerHTML = baseItems.map(item => {
    const unavailable = item.available === false;
    return `
    <div data-item="${escapeHtml(item.id)}" style="background: #2f2519; border-radius: 16px; overflow: hidden; cursor: pointer; border: 1px solid #ffffff14; display: flex; flex-direction: column; ${unavailable ? 'opacity: 0.5;' : ''}">
      <div style="width: 100%; aspect-ratio: 4/3; position: relative;">
        ${item.image ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" style="width:100%;height:100%;object-fit:cover; ${unavailable ? 'filter: grayscale(1);' : ''}">` : placeholderImg(item.name)}
        ${unavailable
          ? `<div style="position: absolute; top: 8px; left: 8px; background: #6b5c47; color: #fff; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; font-family: Inter, sans-serif; letter-spacing: 0.02em;">Agotado</div>`
          : (item.tag ? `<div style="position: absolute; top: 8px; left: 8px; background: #E85D04; color: #fff; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; font-family: Inter, sans-serif; letter-spacing: 0.02em;">${escapeHtml(item.tag)}</div>` : '')}
      </div>
      <div style="padding: 11px 12px 13px; display: flex; flex-direction: column; gap: 4px; flex: 1;">
        <div style="font-family: Poppins, sans-serif; font-weight: 600; font-size: 14px; color: #F4ECE1; line-height: 1.25; ${unavailable ? 'text-decoration: line-through; text-decoration-color: #C9B9A4;' : ''}">${escapeHtml(item.name)}</div>
        <div style="font-family: Inter, sans-serif; font-weight: 700; font-size: 13.5px; color: #F2C14E; margin-top: auto;">${escapeHtml(priceLabelFor(item))}</div>
      </div>
    </div>
  `;
  }).join('');

  grid.querySelectorAll('[data-item]').forEach(card => {
    card.addEventListener('click', () => {
      state.activeItemId = card.dataset.item;
      state.selectedSizeIndex = 0;
      state.qty = 1;
      state.modSelections = {};
      render();
    });
  });
}

function renderModal() {
  const overlay = document.getElementById('item-modal-overlay');
  const modal = document.getElementById('item-modal');
  if (!state.activeItemId || !state.catalog) {
    overlay.style.display = 'none';
    modal.innerHTML = '';
    return;
  }
  const item = state.catalog.ITEMS.find(it => it.id === state.activeItemId);
  if (!item) { overlay.style.display = 'none'; return; }

  const { modDelta, modOverridePrice, modSummaryParts } = computeModifiers(item, state.modSelections);
  const baseUnit = item.price != null ? item.price : item.sizes[state.selectedSizeIndex].price;
  const unitPrice = (modOverridePrice != null ? modOverridePrice : baseUnit) + modDelta;
  const priceLabel = (item.price != null && modOverridePrice == null) ? fmt(item.price) : null;

  let html = '';
  html += `<div style="width: 100%; aspect-ratio: 4/3; position: relative;">`;
  html += item.image ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" style="width:100%;height:100%;object-fit:cover;">` : placeholderImg(item.name);
  html += `<button id="modal-close-btn" style="position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 50%; background: #140f09b0; border: none; color: #fff; font-size: 16px; cursor: pointer;">✕</button>`;
  html += `</div>`;
  html += `<div style="padding: 20px 22px 28px;">`;
  if (item.tag) html += `<div style="display: inline-block; background: #E85D04; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-bottom: 10px; font-family: Inter, sans-serif;">${escapeHtml(item.tag)}</div>`;
  html += `<div style="font-family: Poppins, sans-serif; font-weight: 700; font-size: 22px; color: #F4ECE1;">${escapeHtml(item.name)}</div>`;
  if (item.desc) html += `<div style="font-size: 14px; color: #C9B9A4; margin-top: 8px; line-height: 1.5;">${escapeHtml(item.desc)}</div>`;

  if (item.mods && item.mods.length) {
    item.mods.forEach(gid => {
      const group = state.catalog.MODIFIER_GROUPS[gid];
      const sel = state.modSelections[gid];
      html += `<div style="margin-top: 18px;">`;
      html += `<div style="font-family: Poppins, sans-serif; font-weight: 600; font-size: 13.5px; color: #C9B9A4; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.03em;">${escapeHtml(group.name)}</div>`;
      html += `<div style="display: flex; flex-wrap: wrap; gap: 8px;">`;
      group.options.forEach((opt, i) => {
        let selected;
        if (group.type === 'single') selected = (sel != null ? sel : 0) === i;
        else selected = (sel || []).includes(i);
        let label = opt.label;
        if (opt.override) label = `${opt.label} (${fmt(opt.price)})`;
        else if (opt.price) label = `${opt.label} (+${fmt(opt.price)})`;
        const bg = selected ? '#E85D0426' : '#ffffff0a';
        const border = selected ? '#E85D04' : '#ffffff14';
        html += `<button data-mod-group="${escapeHtml(gid)}" data-mod-index="${i}" style="padding: 9px 14px; border-radius: 999px; border: 1px solid ${border}; background: ${bg}; color: #F4ECE1; font-family: Inter, sans-serif; font-weight: 600; font-size: 13px; cursor: pointer;">${escapeHtml(label)}</button>`;
      });
      html += `</div></div>`;
    });
  }

  if (item.sizes && item.sizes.length) {
    html += `<div style="margin-top: 18px; display: flex; flex-direction: column; gap: 8px;">`;
    item.sizes.forEach((sz, i) => {
      const selected = i === state.selectedSizeIndex;
      const bg = selected ? '#E85D0426' : '#ffffff0a';
      const border = selected ? '#E85D04' : '#ffffff14';
      html += `<button data-size-index="${i}" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: 12px; background: ${bg}; border: 1px solid ${border}; cursor: pointer; font-family: Inter, sans-serif; width: 100%; text-align: left;">
        <span style="font-size: 14.5px; font-weight: 600; color: #F4ECE1;">${escapeHtml(sz.label)}</span>
        <span style="font-size: 14.5px; font-weight: 700; color: #F2C14E;">${escapeHtml(fmt(sz.price))}</span>
      </button>`;
    });
    html += `</div>`;
  }

  if (priceLabel) {
    html += `<div style="margin-top: 18px; font-family: Poppins, sans-serif; font-weight: 700; font-size: 22px; color: #F2C14E;">${escapeHtml(priceLabel)}</div>`;
  }

  const unavailable = item.available === false;
  if (unavailable) {
    html += `<div style="margin-top: 18px; padding: 12px 14px; border-radius: 12px; background: #ffffff0a; border: 1px solid #ffffff14; color: #C9B9A4; font-size: 13.5px;">Este producto no está disponible en este momento.</div>`;
  }

  html += `<div style="margin-top: 22px; display: flex; align-items: center; gap: 14px;">
    <div style="display: flex; align-items: center; gap: 12px; background: #ffffff0a; border: 1px solid #ffffff14; border-radius: 12px; padding: 6px 10px; ${unavailable ? 'opacity: 0.4; pointer-events: none;' : ''}">
      <button id="qty-minus" style="width: 28px; height: 28px; border-radius: 8px; border: none; background: #ffffff14; color: #F4ECE1; font-size: 16px; cursor: pointer;">−</button>
      <span style="font-size: 15px; font-weight: 700; min-width: 18px; text-align: center;">${state.qty}</span>
      <button id="qty-plus" style="width: 28px; height: 28px; border-radius: 8px; border: none; background: #ffffff14; color: #F4ECE1; font-size: 16px; cursor: pointer;">+</button>
    </div>
    <button id="add-to-cart-btn" ${unavailable ? 'disabled' : ''} style="flex: 1; padding: 13px; border-radius: 12px; border: none; background: ${unavailable ? '#E85D0460' : '#E85D04'}; color: #fff; font-family: Poppins, sans-serif; font-weight: 700; font-size: 14.5px; cursor: ${unavailable ? 'not-allowed' : 'pointer'};">${unavailable ? 'Agotado' : 'Agregar · ' + escapeHtml(fmt(unitPrice * state.qty))}</button>
  </div>`;
  html += `</div>`;

  modal.innerHTML = html;
  overlay.style.display = 'flex';

  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  modal.onclick = (e) => e.stopPropagation();
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  modal.querySelectorAll('[data-mod-group]').forEach(btn => {
    btn.addEventListener('click', () => {
      const gid = btn.dataset.modGroup;
      const i = Number(btn.dataset.modIndex);
      const group = state.catalog.MODIFIER_GROUPS[gid];
      if (group.type === 'single') {
        state.modSelections = { ...state.modSelections, [gid]: i };
      } else {
        const cur = state.modSelections[gid] || [];
        const next = cur.includes(i) ? cur.filter(x => x !== i) : [...cur, i];
        state.modSelections = { ...state.modSelections, [gid]: next };
      }
      render();
    });
  });
  modal.querySelectorAll('[data-size-index]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.selectedSizeIndex = Number(btn.dataset.sizeIndex);
      render();
    });
  });
  document.getElementById('qty-minus').addEventListener('click', () => { state.qty = Math.max(1, state.qty - 1); render(); });
  document.getElementById('qty-plus').addEventListener('click', () => { state.qty = state.qty + 1; render(); });
  document.getElementById('add-to-cart-btn').addEventListener('click', () => addToCart(item));
}

function closeModal() {
  state.activeItemId = null;
  render();
}

function addToCart(item) {
  const { modDelta, modOverridePrice, modSummaryParts } = computeModifiers(item, state.modSelections);
  const sizeLabel = item.sizes ? item.sizes[state.selectedSizeIndex].label : null;
  const baseUnit = item.price != null ? item.price : item.sizes[state.selectedSizeIndex].price;
  const unitPrice = (modOverridePrice != null ? modOverridePrice : baseUnit) + modDelta;
  const modsLabel = modSummaryParts.length ? modSummaryParts.join(', ') : null;
  const combinedSizeLabel = [sizeLabel, modsLabel].filter(Boolean).join(' · ') || null;
  const key = cartKey(item.id, combinedSizeLabel);
  const existing = state.cart.find(c => c.key === key);
  if (existing) {
    state.cart = state.cart.map(c => c.key === key ? { ...c, qty: c.qty + state.qty } : c);
  } else {
    state.cart = [...state.cart, { key, id: item.id, name: item.name, sizeLabel: combinedSizeLabel, unitPrice, qty: state.qty }];
  }
  state.activeItemId = null;
  state.modSelections = {};
  render();
}

function renderCart() {
  const overlay = document.getElementById('cart-overlay');
  const panel = document.getElementById('cart-panel');
  const badge = document.getElementById('cart-count-badge');

  const cartCount = state.cart.reduce((sum, c) => sum + c.qty, 0);
  if (cartCount > 0) {
    badge.style.display = 'flex';
    badge.textContent = cartCount;
  } else {
    badge.style.display = 'none';
  }

  if (!state.cartOpen) {
    overlay.style.display = 'none';
    return;
  }
  overlay.style.display = 'flex';

  const cartEmpty = state.cart.length === 0;
  const cartTotal = state.cart.reduce((sum, c) => sum + c.qty * c.unitPrice, 0);

  let html = `<div style="padding: 20px 22px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ffffff14;">
    <div style="font-family: Poppins, sans-serif; font-weight: 700; font-size: 19px;">Tu pedido</div>
    <button id="cart-close-btn" style="width: 32px; height: 32px; border-radius: 50%; background: #ffffff14; border: none; color: #fff; font-size: 14px; cursor: pointer;">✕</button>
  </div>`;

  if (cartEmpty) {
    html += `<div style="text-align: center; padding: 50px 20px; color: #C9B9A4;">
      <div style="font-size: 30px; margin-bottom: 8px;">🛒</div>
      <div style="font-size: 14.5px;">Aún no has agregado productos.</div>
    </div>`;
  } else {
    html += `<div style="overflow-y: auto; padding: 12px 22px; display: flex; flex-direction: column; gap: 12px;">`;
    state.cart.forEach(ci => {
      html += `<div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
        <div style="min-width: 0;">
          <div style="font-size: 14px; font-weight: 600; color: #F4ECE1;">${escapeHtml(ci.name)}</div>
          <div style="font-size: 12.5px; color: #C9B9A4;">${escapeHtml(ci.sizeLabel || 'Único')} · ${escapeHtml(fmt(ci.unitPrice))} c/u</div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
          <button data-cart-minus="${escapeHtml(ci.key)}" style="width: 24px; height: 24px; border-radius: 7px; border: none; background: #ffffff14; color: #F4ECE1; cursor: pointer;">−</button>
          <span style="font-size: 13.5px; font-weight: 700; min-width: 14px; text-align: center;">${ci.qty}</span>
          <button data-cart-plus="${escapeHtml(ci.key)}" style="width: 24px; height: 24px; border-radius: 7px; border: none; background: #ffffff14; color: #F4ECE1; cursor: pointer;">+</button>
          <span style="font-size: 13.5px; font-weight: 700; color: #F2C14E; min-width: 68px; text-align: right;">${escapeHtml(fmt(ci.unitPrice * ci.qty))}</span>
          <button data-cart-remove="${escapeHtml(ci.key)}" style="width: 26px; height: 26px; border-radius: 7px; border: none; background: transparent; color: #C9B9A4; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;">✕</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (!cartEmpty) {
    const errFirst = state.customerFormError && !state.customerFirstName.trim();
    const errLast = state.customerFormError && !state.customerLastName.trim();
    html += `<div style="padding: 14px 22px 0; border-top: 1px solid #ffffff14;">
      <div style="font-family: Poppins, sans-serif; font-weight: 600; font-size: 13.5px; color: #C9B9A4; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.03em;">Tus datos</div>
      <div style="display: flex; gap: 8px;">
        <input id="customer-first-name" type="text" placeholder="Nombre" value="${escapeHtml(state.customerFirstName)}" style="flex: 1; min-width: 0; padding: 11px 12px; border-radius: 10px; border: 1px solid ${errFirst ? '#ff6b6b' : '#ffffff20'}; background: #ffffff0d; color: #F4ECE1; font-size: 14px; font-family: Inter, sans-serif; outline: none;">
        <input id="customer-last-name" type="text" placeholder="Apellido" value="${escapeHtml(state.customerLastName)}" style="flex: 1; min-width: 0; padding: 11px 12px; border-radius: 10px; border: 1px solid ${errLast ? '#ff6b6b' : '#ffffff20'}; background: #ffffff0d; color: #F4ECE1; font-size: 14px; font-family: Inter, sans-serif; outline: none;">
      </div>
      ${state.customerFormError ? `<div style="color: #ff6b6b; font-size: 12.5px; margin-top: 6px;">Completa tu nombre y apellido para enviar el pedido.</div>` : ''}
    </div>`;
  }

  const waButtonBg = cartEmpty ? '#E85D0460' : '#25D366';
  html += `<div style="padding: 16px 22px 24px; border-top: ${cartEmpty ? '1px solid #ffffff14' : 'none'};">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
      <span style="font-family: Poppins, sans-serif; font-weight: 700; font-size: 16px;">Total</span>
      <span style="font-family: Poppins, sans-serif; font-weight: 700; font-size: 19px; color: #F2C14E;">${escapeHtml(fmt(cartTotal))}</span>
    </div>
    <button id="whatsapp-btn" ${cartEmpty ? 'disabled' : ''} style="width: 100%; padding: 14px; border-radius: 12px; border: none; background: ${waButtonBg}; color: #fff; font-family: Poppins, sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
      <span>📱</span> Enviar pedido por WhatsApp
    </button>
  </div>`;

  panel.innerHTML = html;

  overlay.onclick = (e) => { if (e.target === overlay) closeCart(); };
  panel.onclick = (e) => e.stopPropagation();
  document.getElementById('cart-close-btn').addEventListener('click', closeCart);
  panel.querySelectorAll('[data-cart-minus]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.cartMinus;
      state.cart = state.cart.map(x => x.key === key ? { ...x, qty: x.qty - 1 } : x).filter(x => x.qty > 0);
      render();
    });
  });
  panel.querySelectorAll('[data-cart-plus]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.cartPlus;
      state.cart = state.cart.map(x => x.key === key ? { ...x, qty: x.qty + 1 } : x);
      render();
    });
  });
  panel.querySelectorAll('[data-cart-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.cartRemove;
      state.cart = state.cart.filter(x => x.key !== key);
      render();
    });
  });
  if (!cartEmpty) {
    // No se llama a render() en estos inputs para no perder el foco mientras el
    // cliente escribe (renderCart() reconstruye todo el innerHTML del panel).
    document.getElementById('customer-first-name').addEventListener('input', (e) => {
      state.customerFirstName = e.target.value;
    });
    document.getElementById('customer-last-name').addEventListener('input', (e) => {
      state.customerLastName = e.target.value;
    });
    document.getElementById('whatsapp-btn').addEventListener('click', handleWhatsAppClick);
  }
}

function closeCart() {
  state.cartOpen = false;
  render();
}

function handleWhatsAppClick() {
  if (state.cart.length === 0) return;
  if (!state.customerFirstName.trim() || !state.customerLastName.trim()) {
    state.customerFormError = true;
    render();
    return;
  }
  state.customerFormError = false;
  sendWhatsApp();
}

function sendWhatsApp() {
  if (state.cart.length === 0) return;
  const fullName = `${state.customerFirstName.trim()} ${state.customerLastName.trim()}`.trim();
  const cartTotal = state.cart.reduce((sum, c) => sum + c.qty * c.unitPrice, 0);
  const lines = state.cart.map(c => `• ${c.qty}x ${c.name}${c.sizeLabel ? ' (' + c.sizeLabel + ')' : ''} — ${fmt(c.unitPrice * c.qty)}`);
  const tableLine = state.tableNumber ? `📍 Mesa: ${state.tableNumber}\n` : '';
  const text = `Hola 88° Grados Café, soy ${fullName} y quiero hacer este pedido:\n${tableLine}\n${lines.join('\n')}\n\nTotal: ${fmt(cartTotal)}`;
  const cleanPhone = String(WHATSAPP_NUMBER).replace(/\D/g, '');
  const url = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

function renderTableBadge() {
  const badge = document.getElementById('table-badge');
  if (state.tableNumber) {
    badge.style.display = 'flex';
    badge.textContent = '📍 Mesa ' + state.tableNumber;
  } else {
    badge.style.display = 'none';
  }
}

document.getElementById('cart-btn').addEventListener('click', () => { state.cartOpen = true; render(); });
document.getElementById('search-input').addEventListener('input', (e) => { state.search = e.target.value; render(); });

async function init() {
  renderTableBadge();
  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const catalog = await res.json();
    state.catalog = catalog;
    state.activeCategory = catalog.CATEGORIES[0].id;
    render();
  } catch (err) {
    document.getElementById('loading-state').textContent = 'No se pudo cargar el menú. Intenta recargar la página.';
    console.error('Error cargando menu-data.json', err);
  }
}

init();
</script>

</body>
</html>
